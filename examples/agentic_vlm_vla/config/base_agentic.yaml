# Agentic VLM + VLA alternating GRPO training config
#
# This config orchestrates two models:
#   1. VLM  – generates textual plans/instructions (trained with GRPO in phase B)
#   2. VLA  – executes actions from instructions (supervised training in phase A)
#
# Training alternates every `runner.alternating_interval` steps.
# Phase A (VLA): VLM generates one text per sample → VLA trains with native
#   supervised loss (flow-matching / CE) on demonstration data.
# Phase B (VLM): VLM generates K texts per prompt → frozen VLA predicts
#   actions → MSE between predicted and ground-truth actions is the reward
#   → GRPO updates the VLM.

defaults:
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

# ---------------------------------------------------------------------------
# Cluster
# ---------------------------------------------------------------------------
cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout,reward: all

# ---------------------------------------------------------------------------
# Runner
# ---------------------------------------------------------------------------
runner:
  task_type: agentic_vlm_vla
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "agentic_vlm_vla"
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1
  only_eval: False
  val_check_interval: 20
  save_interval: 100
  weight_sync_interval: 1

  # How many steps to run each phase before switching.
  # VLA and VLM phases can have independent durations.
  vla_alternating_interval: 10   # steps of VLA supervised training
  vlm_alternating_interval: 10   # steps of VLM GRPO training
  # Legacy shorthand (sets both if the per-phase keys are absent):
  # alternating_interval: 10
  initial_phase: "vla"  # start with VLA training

  resume_dir: null
  ckpt_path: null

# ---------------------------------------------------------------------------
# Algorithm (shared between phases)
# ---------------------------------------------------------------------------
algorithm:
  # GRPO group size — number of VLM rollout outputs per prompt (phase B)
  group_size: 4

  # VLA training (phase A) uses the model's native supervised loss
  # (flow-matching MSE for pi0/pi0.5, cross-entropy for pi0-fast).
  # No RL advantages are computed for VLA training.

  # VLM training (phase B) — advantage type.
  # Supported: "grpo" (standard), "dr_grpo" (length-bias corrected)
  vlm_adv_type: grpo

  # KL divergence penalty against the VLM reference policy (phase B).
  # Set vlm_kl_coeff > 0 to enable.  The reference log-probs are
  # computed from the frozen initial VLM weights.
  vlm_kl_coeff: 0.0              # 0 = disabled; typical values: 0.01–0.1
  vlm_kl_type: "low_var_kl"      # "kl", "abs", "mse", "low_var_kl"

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

# ---------------------------------------------------------------------------
# Environment (embodied — for VLA evaluation only)
# Phase A (VLA training) uses demonstration data, not env interaction.
# ---------------------------------------------------------------------------
env:
  group_name: "EnvGroup"
  train:
    env_type: "maniskill"
    total_num_envs: 32
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    group_size: 1
    ignore_terminations: False
    init_params: {}
  eval:
    env_type: "maniskill"
    total_num_envs: 32
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    use_fixed_reset_state_ids: True
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: False
    init_params: {}

# ---------------------------------------------------------------------------
# VLA Rollout (HuggingFace rollout for evaluation only)
# During Phase A, the VLA trains with supervised learning — no rollout needed.
# The rollout worker is used during evaluation to run the VLA in the env.
# NOTE: Set vla_model_path below and all VLA paths will reference it.
# ---------------------------------------------------------------------------
# PLACEHOLDER: Replace with your actual VLA checkpoint path, e.g.
# "s3://bucket/RLinf-Pi05-Libero-SFT" or a local path.
vla_model_path: &vla_model_path "/path/to/vla/checkpoint"

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: *vla_model_path
    precision: null

# ---------------------------------------------------------------------------
# VLA Actor (embodied FSDP — supervised training in phase A)
# ---------------------------------------------------------------------------
actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 256
  seed: 0
  enable_offload: False
  model:
    model_path: *vla_model_path
    model_type: "openpi"
    precision: null
    num_action_chunks: 5
    action_dim: 7
    num_steps: 4
    openpi:
      config_name: "pi05_libero"
      num_images_in_input: 2
      noise_level: 0.5
      noise_method: "flow_sde"
      train_expert_only: True
    policy_setup: widowx_bridge
  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: null
      reduce_dtype: null
      buffer_dtype: null

# ---------------------------------------------------------------------------
# VLM Actor (FSDP — trained in phase B with GRPO)
# PLACEHOLDER: Replace with your actual VLM checkpoint path.
# Supported VLM model types: qwen2.5_vl, qwen3_vl, qwen3_vl_moe, gemma4_vl
# ---------------------------------------------------------------------------
vlm_actor:
  group_name: "VLMActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 0
  enable_offload: False
  model:
    model_path: "/path/to/vlm/checkpoint"  # e.g. Qwen3-VL, Qwen2.5-VL, or Gemma-4 VL path
    model_type: "qwen3_vl"
    precision: "bf16"
  optim:
    lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: "bf16"
      reduce_dtype: "bf16"
      buffer_dtype: "bf16"

# ---------------------------------------------------------------------------
# VLA Reward (frozen VLA that scores VLM outputs via action MSE)
# Predicts actions for each VLM output and computes MSE between predicted
# and ground-truth actions.  Lower MSE → higher reward for GRPO.
# Weights are synced from the VLA actor at each phase switch.
# ---------------------------------------------------------------------------
vla_reward:
  group_name: "VLARewardGroup"
  enable_offload: False
  model:
    model_path: *vla_model_path
    model_type: "openpi"
    precision: null
    num_action_chunks: 5
    action_dim: 7
    num_steps: 4
    openpi:
      config_name: "pi05_libero"
      num_images_in_input: 2
      noise_level: 0.5
      noise_method: "flow_sde"
      train_expert_only: True
  reward:
    reward_transform: "negate"  # or "exp_negate"
    reward_scale: 1.0

# ---------------------------------------------------------------------------
# Reward (standard embodied reward — disabled by default)
# ---------------------------------------------------------------------------
reward:
  use_reward_model: False

critic:
  use_critic_model: False
