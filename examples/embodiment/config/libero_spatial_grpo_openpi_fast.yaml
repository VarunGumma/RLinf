defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0_fast@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_grpo_openpi_fast"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 25

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  rollout_epoch: 8
  eval_rollout_epoch: 1

  # Pi0-Fast uses chunk-level log-probs (sum over generated action tokens).
  reward_type: step_level
  logprob_type: chunk_level
  entropy_type: token_level
  single_action_dim: 1

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0
  update_epoch: 2

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 1.0
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: 128
    max_length: 512
    min_length: 1

  filter_rewards: True
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

  staleness_threshold: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    reward_coef: ${algorithm.reward_coef}
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: True
    reset_gripper_open: False
  eval:
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  sync_weight_load_instant: True

  model:
    model_path: "/path/to/model/pi0_fast_libero_sft"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 1024
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/pi0_fast_libero_sft"
    model_type: "openpi_fast"
    num_action_chunks: 10
    action_dim: 7
    num_steps: 1
    add_value_head: False
    openpi:
      config_name: "pi0_fast_libero"
      train_expert_only: True
      max_new_tokens: 128

  optim:
    lr: 5.0e-6
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
